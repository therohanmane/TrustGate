name: TrustGate CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint & Build Client ────────────────────────────────────────────────────
  client:
    name: Client — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 7

  # ── 2. Lint & Test Server ─────────────────────────────────────────────────────
  server:
    name: Server — Lint & Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    env:
      NODE_ENV: test
      PORT: 5000
      MONGODB_URI: mongodb://localhost:27017/trustgate_test
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret-key-at-least-32-characters-long' }}
      JWT_EXPIRE: 1d
      MASTER_ENCRYPTION_KEY: ${{ secrets.MASTER_ENCRYPTION_KEY || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
      CLIENT_URL: http://localhost:5173
      EMAIL_USER: test@example.com
      EMAIL_PASS: testpass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check syntax (node --check)
        run: node --check server.js

  # ── 3. Docker Build Check ─────────────────────────────────────────────────────
  docker:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [client, server]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: trustgate/server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          tags: trustgate/client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
